name: Software gate

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: software-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: windows-2022
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Arm GNU Toolchain
        uses: carlosperate/arm-none-eabi-gcc-action@v1.12.3
        with:
          release: 13.3.Rel1

      - name: Verify software release gates
        shell: pwsh
        run: ./scripts/verify_release.ps1 -SkipKeil

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: daplink-wireless-${{ github.sha }}
          path: |
            build/gcc/release/daplink_wireless.bin
            build/gcc/release/daplink_wireless.elf
            build/gcc/release/daplink_wireless.hex
            build/gcc/release/manifest.json
          if-no-files-found: error
          retention-days: 14
